services:
  control-plane:
    build:
      context: .
      dockerfile: deploy/Dockerfile.control-plane
    environment:
      CONTROL_PLANE_ADDR: ":8080"
      PLATFORM_DATA_FILE: /app/data/platform.json
      PROXY_CORE_ORIGIN: http://proxy-core:8081
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  proxy-core:
    build:
      context: .
      dockerfile: deploy/Dockerfile.proxy-core
    environment:
      PROXY_CORE_ADDR: ":8081"
      PLATFORM_DATA_FILE: /app/data/platform.json
    ports:
      - "8081:8081"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

