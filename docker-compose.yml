version: '3.8'

services:
  control-plane:
    image: ghcr.io/nike232/unified-subscription-proxy-control-plane:main
    ports:
      - "8080:8080"
    environment:
      - POSTGRES_DSN=postgres://postgres:password@db:5432/subscription_proxy?sslmode=disable
      - REDIS_ADDR=redis:6379
      - PORT=8080
    depends_on:
      - db
      - redis

  proxy-core:
    image: ghcr.io/nike232/unified-subscription-proxy-proxy-core:main
    ports:
      - "8045:8045" # Main Proxy Port
      - "19527:19527" # Admin Protocol Port (Legacy)
    environment:
      - CONTROL_PLANE_URL=http://control-plane:8080
      - ABV_API_KEY=admin
      - ABV_AUTH_MODE=strict
    command: ["--headless"]
    depends_on:
      - control-plane

  web:
    image: ghcr.io/nike232/unified-subscription-proxy-web:main
    ports:
      - "80:80"
      - "3000:80"
    depends_on:
      - control-plane

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=subscription_proxy
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"

volumes:
  pgdata:
  redisdata:
