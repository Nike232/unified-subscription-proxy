name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"
      - run: go test ./...
      - run: go build ./apps/control-plane ./apps/proxy-core

