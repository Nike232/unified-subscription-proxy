name: Docker Build & Push

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      SHOULD_PUSH: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
    strategy:
      fail-fast: false
      matrix:
        service: [control-plane, proxy-core-go, proxy-core-rust, web]
        include:
          - service: control-plane
            dockerfile: apps/control-plane/Dockerfile
            context: .
          - service: proxy-core-go
            dockerfile: apps/proxy-core-go/Dockerfile
            context: .
          - service: proxy-core-rust
            dockerfile: apps/proxy-core-rust/Dockerfile
            context: apps/proxy-core-rust
          - service: web
            dockerfile: apps/web/Dockerfile
            context: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: env.SHOULD_PUSH == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Image Name Lowcase
        run: |
          IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/unified-subscription-proxy-${{ matrix.service }}"
          echo "IMAGE_NAME=$(printf '%s' "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Show build target
        run: |
          echo "service=${{ matrix.service }}"
          echo "context=${{ matrix.context }}"
          echo "dockerfile=${{ matrix.dockerfile }}"
          echo "push=${SHOULD_PUSH}"

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ env.SHOULD_PUSH == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
