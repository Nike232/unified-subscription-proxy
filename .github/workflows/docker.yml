name: Docker

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  docker-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [control-plane, proxy-core]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.${{ matrix.service }}
          push: false
          tags: unified-subscription-proxy/${{ matrix.service }}:latest

